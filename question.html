<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="static/WordLink.png" />
    <script type="module" src="static/question.js"></script>
    <link rel="stylesheet" href="static/question_styles.css" />
    <title>Word Link</title>
  </head>
  <body>
    <div id="title">
      <h1 id="title-text">
        Which two words are most closely related to
        <b id="ans0"><span></span></b>?
      </h1>
      <img
        src="static/speaker.png"
        alt="Play sound"
        draggable="false"
        id="audio0"
        class="audio-btn"
      />
      <img src="static/info.png" alt="Help" draggable="false" id="help0" />
    </div>

    <div id="popup">
      <div id="banner">
        <h2></h2>
        <img
          src="static/speaker.png"
          alt="Play sound"
          draggable="false"
          id="play"
        />
        <img src="static/exit.png" alt="X" draggable="false" id="exit" />
      </div>
      <span id="text"></span>
    </div>

    <div id="grid-container">
      <button class="grid-item auto-font-size" id="ans1">
        <span></span>
        <img
          src="static/speaker.png"
          alt="Play sound"
          draggable="false"
          id="audio1"
          class="audio-btn"
        />
        <img
          src="static/info.png"
          alt="Help"
          draggable="false"
          id="help1"
          class="help-btn"
        />
      </button>
      <button class="grid-item auto-font-size" id="ans2">
        <span></span>
        <img
          src="static/speaker.png"
          alt="Play sound"
          draggable="false"
          id="audio2"
          class="audio-btn"
        />
        <img
          src="static/info.png"
          alt="Help"
          draggable="false"
          id="help2"
          class="help-btn"
        />
      </button>
      <button class="grid-item auto-font-size bottom-row" id="ans3">
        <span></span>
        <img
          src="static/speaker.png"
          alt="Play sound"
          draggable="false"
          id="audio3"
          class="audio-btn"
        />
        <img
          src="static/info.png"
          alt="Help"
          draggable="false"
          id="help3"
          class="help-btn"
        />
      </button>
      <button class="grid-item auto-font-size bottom-row" id="ans4">
        <span></span>
        <img
          src="static/speaker.png"
          alt="Play sound"
          draggable="false"
          id="audio4"
          class="audio-btn"
        />
        <img
          src="static/info.png"
          alt="Help"
          draggable="false"
          id="help4"
          class="help-btn"
        />
      </button>
      <img src="static/NextArrow.png" alt="Next" draggable="false" id="next" />
      <img src="static/Home.png" alt="Home" draggable="false" id="home" />
    </div>
  </body>
</html>
