<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="../static/WordLink.png" />
    <script src="../static/index.js"></script>
    <link rel="stylesheet" href="../static/index_styles.css" />
    <title>Word Link</title>
  </head>
  <body>
    <h1 id="title">Word Link</h1>

    <div class="carousel-container">
      <div id="carousel-slide0" class="item-container active">
        <img
          src="../static/WordLinkTitleSlide.jpg"
          class="item"
          alt="Word Link"
          draggable="false"
          id="carousel-image0"
        />
      </div>
      <div id="carousel-slide1" class="item-container inactive">
        <div id="SWOW-link"></div>
        <img
          src="../static/speaker.png"
          alt="Play sound"
          draggable="false"
          id="audio1"
          class="audio-btn"
        />
        <img
          id="carousel-image1"
          class="item"
          draggable="false"
          src="../static/SWOWSlide.jpg"
        />
      </div>
      <div id="carousel-slide2" class="item-container inactive">
        <img
          src="../static/speaker.png"
          alt="Play sound"
          draggable="false"
          id="audio2"
          class="audio-btn"
        />
        <img
          id="carousel-image2"
          class="item"
          draggable="false"
          src="../static/LinkSlide.jpg"
        />
      </div>
      <div id="carousel-slide3" class="item-container inactive">
        <img
          src="../static/speaker.png"
          alt="Play sound"
          draggable="false"
          id="audio3"
          class="audio-btn"
        />
        <img
          id="carousel-image3"
          class="item"
          draggable="false"
          src="../static/BrainSlide.jpg"
        />
      </div>
      <div id="carousel-slide4" class="item-container inactive">
        <img
          src="../static/speaker.png"
          alt="Play sound"
          draggable="false"
          id="audio4"
          class="audio-btn"
        />
        <img
          id="carousel-image4"
          class="item"
          draggable="false"
          src="../static/ProgramSlide.jpg"
        />
      </div>
      <div id="carousel-slide5" class="item-container inactive">
        <img
          src="../static/speaker.png"
          alt="Play sound"
          draggable="false"
          id="audio5"
          class="audio-btn"
        />
        <img
          id="carousel-image5"
          class="item"
          draggable="false"
          src="../static/AcknowledgementsSlide.jpg"
        />
      </div>
    </div>

    <h2 id="find-out-more" class="subheading">Find out more:</h2>

    <div id="indicator-background">
      <div class="carousel-indicators">
        <img
          id="carousel-btn1"
          class="carousel-indicator"
          draggable="false"
          src="../static/world.PNG"
        />
        <img
          id="carousel-btn2"
          class="carousel-indicator"
          draggable="false"
          src="../static/Quotes.png"
        />
        <img
          id="carousel-btn3"
          class="carousel-indicator"
          draggable="false"
          src="../static/brain.png"
        />
        <img
          id="carousel-btn4"
          class="carousel-indicator"
          draggable="false"
          src="../static/computer.png"
        />
        <img
          id="carousel-btn5"
          class="carousel-indicator"
          draggable="false"
          src="../static/Links.png"
        />
      </div>
    </div>

    <h2 id="start-exercise" class="subheading">Start exercise:</h2>

    <div id="play-btn-container">
      <img
        src="../static/Level1.jpg"
        alt="Level 1"
        draggable="false"
        id="Level1"
        class="play-btn"
      />

      <img
        src="../static/Level2.jpg"
        alt="Level 2"
        draggable="false"
        id="Level2"
        class="play-btn"
      />
    </div>
  </body>
</html>
